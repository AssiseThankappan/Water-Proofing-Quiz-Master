<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⚡ PaintVita Quiz zone ⚡</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fredoka+One&family=Quicksand:wght@500;700&display=swap');
        
        * { box-sizing: border-box; font-family: 'Quicksand', sans-serif; }
        
        body { 
            background: linear-gradient(135deg, #0f0c20 0%, #15102a 40%, #03001e 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            margin: 0;
            overflow-x: hidden;
        }

        /* Funky Floating Geometry backgrounds */
        body::before { content: "🎨"; position: absolute; font-size: 10rem; top: -5%; left: -5%; opacity: 0.15; transform: rotate(-20deg); }
        body::after { content: "🚀"; position: absolute; font-size: 10rem; bottom: -5%; right: -5%; opacity: 0.15; transform: rotate(15deg); }

        .container { 
            width: 100%;
            max-width: 600px; 
            background: rgba(255, 255, 255, 0.07);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 2px solid rgba(255, 255, 255, 0.1);
            padding: 40px 30px; 
            border-radius: 24px; 
            box-shadow: 0 20px 40px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.2); 
            color: #fff;
            position: relative;
        }

        h2 { 
            font-family: 'Fredoka One', cursive;
            font-size: 2.2rem;
            text-align: center;
            margin-top: 0;
            background: linear-gradient(45deg, #ff007f, #39ff14, #00d2ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0px 0px 15px rgba(255, 0, 127, 0.3);
            letter-spacing: 1px;
        }

        .hidden { display: none !important; }

        /* Form Inputs */
        .form-group { margin-bottom: 20px; text-align: left; }
        .form-group label { display: block; margin-bottom: 8px; font-weight: 700; color: #ff007f; letter-spacing: 0.5px;}
        .form-group input { 
            width: 100%; padding: 14px; background: rgba(0,0,0,0.3); border: 2px solid #555; 
            border-radius: 12px; color: #fff; font-size: 1rem; transition: 0.3s;
        }
        .form-group input:focus { border-color: #39ff14; outline: none; box-shadow: 0 0 10px rgba(57, 255, 20, 0.5); }

        /* Buttons */
        button { 
            background: linear-gradient(45deg, #ff007f, #7928ca);
            color: white; padding: 15px 25px; border: none; border-radius: 14px; 
            cursor: pointer; font-size: 1.2rem; font-weight: bold; width: 100%; 
            box-shadow: 0 5px 15px rgba(255, 0, 127, 0.4); transform: translateY(0); transition: 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        button:hover { transform: translateY(-3px); box-shadow: 0 8px 25px rgba(255, 0, 127, 0.6); }
        button:active { transform: translateY(1px); }

        /* Options Mapping */
        .options { margin-top: 25px; }
        .option-item { 
            display: block; margin-bottom: 15px; padding: 16px; background: rgba(255,255,255,0.06); 
            border-radius: 14px; cursor: pointer; border: 2px solid rgba(255,255,255,0.15); transition: 0.2s ease;
        }
        .option-item:hover { background: rgba(255,255,255,0.15); border-color: #00d2ff; }
        .option-item input { display: none; }

        /* Real-time State Highlights */
        .option-item.correct-pick { border-color: #39ff14 !important; background: rgba(57, 255, 20, 0.2) !important; color: #39ff14; font-weight: bold; box-shadow: 0 0 15px rgba(57,255,20,0.3); }
        .option-item.incorrect-pick { border-color: #ff0055 !important; background: rgba(255, 0, 85, 0.2) !important; color: #ff0055; box-shadow: 0 0 15px rgba(255,0,85,0.3); }
        .option-item.disabled { pointer-events: none; opacity: 0.6; }
        .option-item.correct-pick.disabled { opacity: 1; }

        /* Interactive Elements */
        .explanation { 
            margin-top: 20px; font-size: 1rem; color: #fff; background: rgba(0, 210, 255, 0.15); 
            padding: 18px; border-radius: 12px; border-left: 6px solid #00d2ff; text-align: left;
            animation: popIn 0.4s ease forwards;
        }
        @keyframes popIn { from { opacity:0; transform: scale(0.95); } to { opacity:1; transform: scale(1); } }

        #timer-bar { display: flex; justify-content: space-between; font-weight: bold; color: #39ff14; margin-bottom: 20px; font-size: 1.1rem; }
        .progress { background: rgba(255,255,255,0.1); height: 8px; border-radius: 4px; overflow: hidden; margin-bottom: 25px; }
        .progress-inner { height: 100%; background: linear-gradient(90deg, #ff007f, #00d2ff); width: 0%; transition: width 0.4s ease; }
        
        .loader { text-align: center; font-size: 1.5rem; font-weight: bold; color: #00d2ff; text-shadow: 0 0 10px rgba(0,210,255,0.5); }
    </style>
</head>
<body>

<div class="container">
    <div id="loader" class="loader">🌀 LOADING THE FUNK...</div>

    <!-- Step 1: Funky Onboarding Registration -->
    <div id="registrationForm" class="hidden">
        <h2>🎉 PaintVita Challenge</h2>
        <p style="text-align: center; opacity: 0.8; margin-bottom: 30px;">Lock and load your details to enter the arena!</p>
        <div class="form-group"><label>Name</label><input type="text" id="name" required placeholder="Rockstar Name"></div>
        <div class="form-group"><label>Official Email</label><input type="email" id="email" required placeholder="name@company.com"></div>
        <div class="form-group"><label>Employee ID</label><input type="text" id="empId" required placeholder="EMP1234"></div>
        <div class="form-group"><label>EC Store</label><input type="text" id="ecStore" required placeholder="Hub Location"></div>
        <button onclick="startQuiz()">LET'S PLAY! 🚀</button>
    </div>

    <!-- Step 2: Screen-by-Screen Single Question Interface -->
    <div id="quizSection" class="hidden">
        <div id="timer-bar">
            <span id="questionNum">Question 1/X</span>
            <span id="timer">⏱️ 0s</span>
        </div>
        <div class="progress"><div id="progressInner" class="progress-inner"></div></div>
        
        <div id="singleQuestionContainer"></div>
        
        <div id="actionArea" style="margin-top:25px;">
            <!-- Appears dynamically after answering -->
            <button id="nextBtn" class="hidden" onclick="nextQuestion()">NEXT QUESTION ➡️</button>
        </div>
    </div>

    <!-- Step 3: Flashy End Splash -->
    <div id="resultSection" class="hidden">
        <h2>😎 LEVEL COMPLETE!</h2>
        <p id="scoreDisplay" style="font-size: 1.4rem; text-align: center; padding: 25px; background: rgba(255,255,255,0.1); border-radius: 16px; margin: 25px 0; border: 1px solid rgba(255,255,255,0.2);"></p>
        <button onclick="window.location.href='leaderboard.html'" style="background: linear-gradient(45deg, #39ff14, #00d2ff); color:#000;">VIEW LEADERBOARD 🏆</button>
    </div>
</div>

<script>
    const SCRIPT_URL = 'YOUR_GOOGLE_APPS_SCRIPT_WEB_APP_URL';
    let questionsData = [];
    let currentIdx = 0;
    let score = 0;
    let startTime, timerInterval, timeTaken = 0;

    window.onload = () => {
        fetch(SCRIPT_URL + '?action=getQuestions')
            .then(res => res.json())
            .then(data => {
                questionsData = data;
                document.getElementById('loader').classList.add('hidden');
                document.getElementById('registrationForm').classList.remove('hidden');
            }).catch(() => { document.getElementById('loader').innerText = "❌ Uh-Oh. Backend connection failed."; });
    };

    function startQuiz() {
        const ids = ['name', 'email', 'empId', 'ecStore'];
        for(let id of ids) { if(!document.getElementById(id).value.trim()) return alert("Fill out all the fields to grab your spot!"); }
        
        document.getElementById('registrationForm').classList.add('hidden');
        document.getElementById('quizSection').classList.remove('hidden');
        
        startTime = Date.now();
        timerInterval = setInterval(() => {
            timeTaken = Math.floor((Date.now() - startTime) / 1000);
            document.getElementById('timer').innerText = `⏱️ ${timeTaken}s`;
        }, 1000);

        showQuestion(currentIdx);
    }

    function showQuestion(idx) {
        document.getElementById('nextBtn').classList.add('hidden');
        
        // Update Meta Metrics
        document.getElementById('questionNum').innerText = `Question ${idx + 1} of ${questionsData.length}`;
        document.getElementById('progressInner').style.width = `${((idx) / questionsData.length) * 100}%`;
        
        const container = document.getElementById('singleQuestionContainer');
        const q = questionsData[idx];
        
        let optionsHtml = '';
        for (const [key, value] of Object.entries(q.options)) {
            if (value) {
                optionsHtml += `
                    <label class="option-item" id="label_${key.replace(' ', '')}" onclick="selectAnswer('${key}')">
                        <input type="radio" name="quizOpt" value="${key}"> 
                        <strong>${key.replace('Option ', '')}:</strong> ${value}
                    </label>
                `;
            }
        }

        container.innerHTML = `
            <p style="font-size: 1.3rem; font-weight: 700; line-height: 1.5; margin-bottom: 20px;">${q.text}</p>
            <div class="options">${optionsHtml}</div>
            <div id="liveFeedback" class="explanation hidden"></div>
        `;
    }

    function selectAnswer(chosenKey) {
        const q = questionsData[currentIdx];
        
        // Freeze options right away
        const items = document.querySelectorAll('.option-item');
        items.forEach(el => el.classList.add('disabled'));
        
        const chosenLabel = document.getElementById(`label_${chosenKey.replace(' ', '')}`);
        const correctLabel = document.getElementById(`label_${q.correct.replace(' ', '')}`);
        
        // Check condition and highlight
        if (chosenKey === q.correct) {
            chosenLabel.classList.add('correct-pick');
            score += Number(q.marks);
        } else {
            chosenLabel.classList.add('incorrect-pick');
            if(correctLabel) correctLabel.classList.add('correct-pick'); // expose real correct one
        }
        
        // Show explanation drop down seamlessly
        const feedback = document.getElementById('liveFeedback');
        feedback.innerHTML = `🌟 <strong>Answer Details:</strong><br><p style="margin: 8px 0 0 0;">${q.explanation}</p>`;
        feedback.classList.remove('hidden');
        
        // Reveal next progression stepping block
        const nextBtn = document.getElementById('nextBtn');
        if (currentIdx === questionsData.length - 1) {
            nextBtn.innerText = 'FINISH & CALCULATE SCORE 🏁';
        }
        nextBtn.classList.remove('hidden');
    }

    function nextQuestion() {
        if (currentIdx < questionsData.length - 1) {
            currentIdx++;
            showQuestion(currentIdx);
        } else {
            finishQuiz();
        }
    }

    function finishQuiz() {
        clearInterval(timerInterval);
        document.getElementById('nextBtn').innerText = 'Syncing Score...';
        document.getElementById('nextBtn').disabled = true;

        const payload = {
            action: 'submitQuiz',
            name: document.getElementById('name').value, email: document.getElementById('email').value,
            empId: document.getElementById('empId').value, ecStore: document.getElementById('ecStore').value,
            score: score, timeTaken: timeTaken
        };

        fetch(SCRIPT_URL, {
            method: 'POST',
            body: JSON.stringify(payload),
            headers: { 'Content-Type': 'text/plain;charset=utf-8' }
        }).then(res => res.json())
        .then(() => {
            document.getElementById('quizSection').classList.add('hidden');
            document.getElementById('scoreDisplay').innerHTML = `You secured <strong style="color:#39ff14;">${score} points</strong><br> within <strong style="color:#00d2ff;">${timeTaken} seconds</strong>!`;
            document.getElementById('resultSection').classList.remove('hidden');
        }).catch(() => alert("Saved offline or network error occurred during transit!"));
    }
</script>
</body>
</html>
