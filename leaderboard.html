<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PaintVita Leaderboard</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #eef2f3; padding: 20px; color: #333; }
        .container { max-width: 800px; margin: auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); text-align: center; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; text-align: left; }
        th, td { border: 1px solid #eaeaea; padding: 12px 15px; }
        th { background: #007bff; color: white; text-transform: uppercase; font-size: 0.9em; }
        tr:nth-child(even) { background-color: #f9f9f9; }
        .rank-1 { background: #fff8e1 !important; font-weight: bold; }
        .rank-2 { background: #f5f5f5 !important; font-weight: bold; }
        .rank-3 { background: #fbe9e7 !important; font-weight: bold; }
        button { background: #6c757d; color: white; padding: 10px 20px; border: none; border-radius: 6px; cursor: pointer; text-decoration: none; display: inline-block; margin-top: 20px; }
        button:hover { background: #5a6268; }
        .loader { font-style: italic; color: #666; margin: 20px 0; }
    </style>
</head>
<body>

<div class="container">
    <h2>🏆 PaintVita Leaderboard</h2>
    <div id="loader" class="loader">Loading latest scores...</div>
    <table id="leaderboardTable" style="display: none;">
        <thead>
            <tr>
                <th>Rank</th>
                <th>Name</th>
                <th>Score</th>
                <th>Time Taken</th>
            </tr>
        </thead>
        <tbody id="leaderboardBody">
        </tbody>
    </table>
    <button onclick="window.location.href='quiz.html'">Back to Quiz</button>
</div>

<script>
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbySBiTn1HngO8asovRHlM54WGLxCWv0V0IfHylyF-15uI0uy98MSlTCKq4kUtNVlfs21g/exec';

    window.onload = () => {
        fetch(SCRIPT_URL + '?action=getLeaderboard')
            .then(res => res.json())
            .then(data => {
                document.getElementById('loader').style.display = 'none';
                document.getElementById('leaderboardTable').style.display = 'table';
                
                const tbody = document.getElementById('leaderboardBody');
                data.forEach((entry, index) => {
                    const tr = document.createElement('tr');
                    
                    let rankIcon = index + 1;
                    if(index === 0) { tr.className = 'rank-1'; rankIcon = '🥇 1'; }
                    else if(index === 1) { tr.className = 'rank-2'; rankIcon = '🥈 2'; }
                    else if(index === 2) { tr.className = 'rank-3'; rankIcon = '🥉 3'; }

                    tr.innerHTML = `
                        <td>${rankIcon}</td>
                        <td>${entry.name}</td>
                        <td><strong>${entry.score}</strong></td>
                        <td>${entry.timeTaken}s</td>
                    `;
                    tbody.appendChild(tr);
                });
            })
            .catch(() => { document.getElementById('loader').innerText = "Failed to load leaderboard."; });
    };
</script>
</body>
</html>
