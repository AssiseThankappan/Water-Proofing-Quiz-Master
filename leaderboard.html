<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🌊 HydroHustle Leaderboard</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&family=Righteous&display=swap');
        * { box-sizing: border-box; }
        
        body { 
            background: #0A0F1C;
            background-image: radial-gradient(circle at 85% 50%, rgba(0, 229, 255, 0.1), transparent 30%),
                              radial-gradient(circle at 15% 20%, rgba(57, 255, 20, 0.05), transparent 30%);
            font-family: 'Outfit', sans-serif; color: #fff; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; margin: 0; 
        }
        
        .slick-panel { 
            width: 100%; max-width: 950px; background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 24px; padding: 40px; box-shadow: 0 30px 60px rgba(0,0,0,0.6); text-align: center; 
        }

        h2 { 
            font-family: 'Righteous', cursive; font-size: 3.5rem; margin-top: 0; margin-bottom: 30px; 
            background: linear-gradient(90deg, #00E5FF, #0077FF); -webkit-background-clip: text; -webkit-text-fill-color: transparent; letter-spacing: 2px; text-transform: uppercase;
        }
        
        .filter-box { 
            background: rgba(0,0,0,0.4); padding: 20px; border: 1px solid rgba(0, 229, 255, 0.2); 
            border-radius: 16px; margin-bottom: 25px; display: flex; align-items: center; justify-content: center; gap: 15px; font-weight: 700; font-size: 1.1rem; color: #8892B0;
        }
        select { 
            padding: 12px 20px; font-family: 'Outfit', sans-serif; font-size: 1.1rem; font-weight: 700; background: #0A0F1C; color: #00E5FF;
            border: 2px solid #00E5FF; border-radius: 100px; cursor: pointer; outline: none; transition: 0.3s;
        }
        select:focus { box-shadow: 0 0 15px rgba(0, 229, 255, 0.3); }

        table { width: 100%; border-collapse: separate; border-spacing: 0 10px; margin-top: 10px; text-align: left; font-size: 1.1rem; }
        th, td { padding: 20px; }
        th { color: #8892B0; font-family: 'Righteous', cursive; font-size: 1.2rem; letter-spacing: 1px; text-transform: uppercase; border-bottom: 1px solid rgba(255,255,255,0.05);}
        
        tbody tr { background: rgba(255,255,255,0.02); transition: 0.2s; }
        tbody tr:hover { background: rgba(255,255,255,0.05); transform: scale(1.01); }
        tbody td:first-child { border-radius: 12px 0 0 12px; }
        tbody td:last-child { border-radius: 0 12px 12px 0; }
        
        /* Podium Stylings */
        tr.rank-0 { background: rgba(0, 229, 255, 0.1); border-left: 4px solid #00E5FF; }
        tr.rank-0 td:first-child { border-radius: 0; }
        tr.rank-1 { background: rgba(255, 255, 255, 0.05); }
        tr.rank-2 { background: rgba(255, 255, 255, 0.03); }
        
        button.action-btn { 
            background: linear-gradient(135deg, #39FF14, #00C853); color: #000; font-family: 'Righteous', cursive; font-size: 1.2rem; 
            letter-spacing: 1px; padding: 15px 30px; border: none; border-radius: 100px; box-shadow: 0 10px 20px rgba(57, 255, 20, 0.2); 
            cursor: pointer; transition: all 0.2s; display: inline-block; margin-top: 30px; text-transform: uppercase;
        }
        button.action-btn:hover { transform: translateY(-3px); box-shadow: 0 15px 25px rgba(57, 255, 20, 0.4); }
        
        .loader { font-family: 'Righteous'; font-size: 2rem; color: #00E5FF; margin: 40px 0; animation: pulse 1.5s infinite alternate; }
        @keyframes pulse { from { opacity: 0.5; } to { opacity: 1; text-shadow: 0 0 20px #00E5FF; } }
    </style>
</head>
<body>

<div class="slick-panel">
    <h2>LEADERBOARD</h2>
    
    <div class="filter-box">
        <label for="viewSelect">DATA VIEW:</label>
        <select id="viewSelect" onchange="renderTable()">
            <option value="overall">🌐 Overall Standings</option>
            <option value="1">Module 1</option>
            <option value="2">Module 2</option>
            <option value="3">Module 3</option>
            <option value="4">Module 4</option>
            <option value="5">Module 5</option>
            <option value="6">Module 6</option>
            <option value="7">Module 7</option>
            <option value="8">Module 8</option>
            <option value="9">Module 9</option>
            <option value="10">Module 10</option>
            <option value="11">Module 11</option>
            <option value="12">Module 12</option>
        </select>
    </div>

    <div id="loader" class="loader">FETCHING DATA...</div>
    
    <table id="leaderboardTable" style="display: none;">
        <thead>
            <tr id="tableHeaders"></tr>
        </thead>
        <tbody id="leaderboardBody"></tbody>
    </table>
    
    <button class="action-btn" onclick="window.location.href='quiz.html'">🔙 BACK TO DASHBOARD</button>
</div>

<script>
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbySBiTn1HngO8asovRHlM54WGLxCWv0V0IfHylyF-15uI0uy98MSlTCKq4kUtNVlfs21g/exec';
    let rawData = [];

    window.onload = () => {
        fetch(SCRIPT_URL + '?action=getLeaderboard')
            .then(res => res.json())
            .then(data => {
                rawData = data;
                document.getElementById('loader').style.display = 'none';
                document.getElementById('leaderboardTable').style.display = 'table';
                renderTable();
            }).catch(() => { document.getElementById('loader').innerText = "ERROR FETCHING DATA."; });
    };

    function renderTable() {
        const view = document.getElementById('viewSelect').value;
        const headers = document.getElementById('tableHeaders');
        const tbody = document.getElementById('leaderboardBody');
        tbody.innerHTML = '';
        
        let filteredData = [];

        if(view === 'overall') {
            headers.innerHTML = `<th>Rank</th><th>Agent</th><th style="text-align: center;">Modules</th><th>Score</th><th>Time</th>`;
            filteredData = [...rawData].sort((a, b) => b.totalScore !== a.totalScore ? b.totalScore - a.totalScore : a.totalTime - b.totalTime);
        } else {
            headers.innerHTML = `<th>Rank</th><th>Agent</th><th>Score</th><th>Time</th>`;
            const modId = parseInt(view);
            const playersWithMod = rawData.filter(u => u.moduleData && u.moduleData[modId]);
            filteredData = playersWithMod.sort((a, b) => {
                const sB = b.moduleData[modId].score; const sA = a.moduleData[modId].score;
                const tB = b.moduleData[modId].time; const tA = a.moduleData[modId].time;
                return sB !== sA ? sB - sA : tA - tB;
            });
        }

        if(filteredData.length === 0) {
            tbody.innerHTML = `<tr><td colspan="5" style="text-align:center; color: #8892B0;">No session data found for this view.</td></tr>`;
            return;
        }

        filteredData.forEach((entry, index) => {
            const tr = document.createElement('tr');
            if(index < 3) tr.className = `rank-${index}`;
            
            let medal = index + 1;
            if(index === 0) medal = '🥇';
            if(index === 1) medal = '🥈';
            if(index === 2) medal = '🥉';

            if(view === 'overall') {
                tr.innerHTML = `
                    <td style="font-family: 'Righteous'; font-size: 1.5rem; color: #00E5FF;">${medal}</td>
                    <td style="font-weight: 700;">${entry.name}</td>
                    <td style="text-align:center; font-family: 'Righteous'; font-size: 1.2rem; color: #39FF14;">${entry.modulesCompleted} / 12</td>
                    <td style="font-family: 'Righteous'; font-size: 1.3rem;">${entry.totalScore}</td>
                    <td style="color: #8892B0;">${entry.totalTime}s</td>
                `;
            } else {
                const mod = entry.moduleData[parseInt(view)];
                tr.innerHTML = `
                    <td style="font-family: 'Righteous'; font-size: 1.5rem; color: #00E5FF;">${medal}</td>
                    <td style="font-weight: 700;">${entry.name}</td>
                    <td style="font-family: 'Righteous'; font-size: 1.3rem; color: #39FF14;">${mod.score}</td>
                    <td style="color: #8892B0;">${mod.time}s</td>
                `;
            }
            tbody.appendChild(tr);
        });
    }
</script>
</body>
</html>
