<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz Master Highscores</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fredoka+One&family=Quicksand:wght@500;700&display=swap');
        * { box-sizing: border-box; font-family: 'Quicksand', sans-serif; }
        
        body { 
            background: linear-gradient(135deg, #0f0c20 0%, #15102a 40%, #03001e 100%);
            min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; margin: 0;
        }
        .container { 
            width: 100%; max-width: 750px; background: rgba(255, 255, 255, 0.07); backdrop-filter: blur(16px);
            border: 2px solid rgba(255, 255, 255, 0.1); padding: 40px 30px; border-radius: 24px; text-align: center; color: #fff;
        }
        h2 { 
            font-family: 'Fredoka One', cursive; font-size: 2.5rem; margin-top: 0;
            background: linear-gradient(45deg, #39ff14, #00d2ff); -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        table { width: 100%; border-collapse: collapse; margin-top: 25px; text-align: left; background: rgba(0,0,0,0.2); border-radius: 12px; overflow: hidden; }
        th, td { padding: 15px 20px; }
        th { background: rgba(255, 255, 255, 0.1); color: #ff007f; text-transform: uppercase; font-weight: 700; font-size: 0.9em; letter-spacing: 1px;}
        td { border-bottom: 1px solid rgba(255,255,255,0.05); }
        
        /* Funky podium rows coloring */
        tr.rank-0 { background: rgba(255, 215, 0, 0.15); color: #ffd700; font-weight: bold; }
        tr.rank-1 { background: rgba(192, 192, 192, 0.15); color: #c0c0c0; font-weight: bold; }
        tr.rank-2 { background: rgba(205, 127, 50, 0.15); color: #cd7f32; font-weight: bold; }
        
        button { 
            background: rgba(255,255,255,0.1); border: 2px solid #fff; color: white; padding: 12px 24px; 
            border-radius: 12px; cursor: pointer; font-size: 1rem; font-weight: bold; margin-top: 25px; transition: 0.2s;
        }
        button:hover { background: #fff; color: #000; }
        .loader { font-size: 1.2rem; color: #39ff14; margin: 30px 0; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h2>🏆 Leaderboard 🏆</h2>
    <div id="loader" class="loader">Gathering Champion Metrics...</div>
    <table id="leaderboardTable" style="display: none;">
        <thead>
            <tr>
                <th>Rank</th>
                <th>Player</th>
                <th>Score</th>
                <th>Time taken</th>
            </tr>
        </thead>
        <tbody id="leaderboardBody"></tbody>
    </table>
    <button onclick="window.location.href='quiz.html'">🔄 RUN QUIZ AGAIN</button>
</div>

<script>
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbySBiTn1HngO8asovRHlM54WGLxCWv0V0IfHylyF-15uI0uy98MSlTCKq4kUtNVlfs21g/exec';

    window.onload = () => {
        fetch(SCRIPT_URL + '?action=getLeaderboard')
            .then(res => res.json())
            .then(data => {
                document.getElementById('loader').style.display = 'none';
                document.getElementById('leaderboardTable').style.display = 'table';
                
                const tbody = document.getElementById('leaderboardBody');
                if(data.length === 0) {
                    tbody.innerHTML = `<tr><td colspan="4" style="text-align:center; opacity:0.6;">No runs recorded yet. Be the first!</td></tr>`;
                    return;
                }
                
                data.forEach((entry, index) => {
                    const tr = document.createElement('tr');
                    if(index < 3) tr.className = `rank-${index}`;
                    
                    let medal = index + 1;
                    if(index === 0) medal = '🥇 1st';
                    if(index === 1) medal = '🥈 2nd';
                    if(index === 2) medal = '🥉 3rd';

                    tr.innerHTML = `
                        <td>${medal}</td>
                        <td>${entry.name}</td>
                        <td><span style="color:#39ff14; font-weight:bold;">${entry.score}</span> pts</td>
                        <td>${entry.timeTaken}s</td>
                    `;
                    tbody.appendChild(tr);
                });
            }).catch(() => { document.getElementById('loader').innerText = "Failed to load scores."; });
    };
</script>
</body>
</html>
